name: vibe-todo-backend-02
app: node@18
options:
  ports: "3000"
  install: cd server && npm install
  start: cd server && npm start
  healthz: /
  env:
    - name: NODE_ENV
      value: production
    - name: MONGODB_URI
      value: <YOUR_MONGODB_URI>
    - name: JWT_SECRET
      value: <YOUR_JWT_SECRET>
  buildenv: []
context:
  git:
    url: https://github.com/editor-7/order_bread.git
    branch: main
