name: Deploy to cloudtype
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Connect deploy key
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}
      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: gas0044/jaja-input
          stage: main
          yaml: |
            name: jaja-input
            app: node@18
            options:
              ports: "3000"
              install: npm ci --omit=dev
              start: npm run seed-list && npm start
              healthz: /health
              env:
                - name: NODE_ENV
                  value: production
                - name: CORS_ORIGINS
                  value: https://jaja-input-02.vercel.app,https://jaja-input.vercel.app
                - name: MONGODB_URI
                  value: ${{ secrets.MONGODB_URI }}
                - name: JWT_SECRET
                  value: ${{ secrets.JWT_SECRET }}
              buildenv: []
            context:
              git:
                url: git@github.com:${{ github.repository }}.git
                ref: ${{ github.ref }}
