# 클라우드타입 CLI 배포용 (참고)
# 대시보드 배포 시 이 파일은 참고만. 실제로는 대시보드에서 직접 입력.

name: order-bread
app: node@18
options:
  ports: "3000"
  install: cd server && npm install
  start: cd server && npm run seed-list && npm start
  healthz: /health
  env:
    - name: NODE_ENV
      value: production
    - name: CORS_ORIGINS
      value: https://jaja-input.vercel.app
    - name: MONGODB_URI
      value: ${MONGODB_URI}
    - name: JWT_SECRET
      value: ${JWT_SECRET}
  buildenv: []
context:
  git:
    url: https://github.com/editor-7/order_bread.git
    branch: main
  subdir: server
